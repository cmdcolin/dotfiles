# tmux-256color has a richer terminfo entry than the old screen-256color
# default — enables italics and other sequences inner programs rely on.
set -g default-terminal "tmux-256color"

# Tell tmux the outer terminal supports 24-bit color. Without this, colors
# are quantized to 256 even if your terminal supports millions.
# terminal-features replaces the legacy terminal-overrides/Tc approach (3.2+).
set -as terminal-features ",xterm-256color:RGB"

# Default is 500ms, which makes Escape feel sluggish in neovim because tmux
# waits to distinguish Escape from an Alt/Meta sequence. Bump to ~50 if on
# a high-latency SSH connection.
set -s escape-time 0

# Forward FocusIn/FocusOut events to panes — needed for neovim's autoread
# and autowrite-on-focus-change to fire correctly inside tmux.
set -g focus-events on

# Copy via OSC 52 escape sequences instead of piping to pbcopy/xclip.
# Advantage: works over SSH because the sequence travels back to the local
# terminal. Requires terminal support (iTerm2, WezTerm, Alacritty, etc.).
# Platform-specific copy-command fallback is in ~/.tmux.conf.local.
set -s set-clipboard on

set -g history-limit 100000

# Start window and pane numbering at 1 — 0 is far from the other number keys.
set -g base-index 1
set -g pane-base-index 1

# Close numbering gaps when a window is closed (e.g. 1,3,4 → 1,2,3).
set -g renumber-windows on

set -g mouse on

# Ctrl-b conflicts with the backward-char readline shortcut.
set -g prefix C-]

set -g status-right '%Y-%m-%d'
set -g status-interval 5
set -g status-left-length 100
set -g status-style bg=default

setw -g mode-keys vi

# Exit copy mode immediately after copying so mouse/scroll behaves normally.
bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Without this, clicking while in copy mode (e.g. after scrolling up) does
# nothing — you're stuck until you press q or Escape.
bind-key -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X cancel

# Open splits in the current pane's directory, not the session root.
bind = split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch windows without the prefix key.
# Uses Option key on macOS — requires your terminal to send Option as Meta/Esc+.
# iTerm2: Profiles → Keys → Left Option key = Esc+
# h/l rather than arrows avoids escape-sequence ambiguity on macOS terminals.
bind -n M-h previous-window
bind -n M-l next-window

# Machine-specific overrides (pbcopy on macOS, xclip on Linux, etc).
if-shell "[ -f ~/.tmux.conf.local ]" "source-file ~/.tmux.conf.local"
