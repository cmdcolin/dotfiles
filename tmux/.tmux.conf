# --- Terminal & Colors ---
set -g default-terminal "tmux-256color"
# Support truecolor for common terminals (xterm, alacritty, kitty, gnome)
set -as terminal-features ",xterm*:RGB"
set -as terminal-features ",alacritty*:RGB"
set -as terminal-features ",gnome*:RGB"
set -as terminal-features ",foot*:RGB"

# --- The "Good Mouse" Setup ---
set -g mouse on

# Don't exit copy mode or jump to bottom after mouse selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# --- Modern Idiomatic Defaults ---
set -s escape-time 0
set -g focus-events on
set -s set-clipboard on
set -g history-limit 100000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Visuals
set -g status-style bg=default
set -g status-right "%Y-%m-%d %H:%M"
setw -g window-status-current-style fg=cyan,bold

# Standard Splits (CWD-aware)
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"

# macOS/Linux Window switching
bind -n M-h previous-window
bind -n M-l next-window

# Load overrides
if-shell "[ -f ~/.tmux.conf.local ]" "source-file ~/.tmux.conf.local
